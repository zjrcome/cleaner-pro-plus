<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<style>
body { font-family: "Microsoft YaHei", sans-serif; width: 240px; padding: 12px; margin: 0; }
h3 { margin: 0 0 10px 0; color: #333; font-size: 16px; }
.status {
    padding: 8px; margin-bottom: 10px; border-radius: 6px;
    text-align: center; font-size: 13px;
}
.status.on { background: #d4edda; color: #155724; }
.status.off { background: #f8d7da; color: #721c24; }
.count { font-size: 20px; font-weight: bold; display: block; margin: 4px 0; }
button {
    width: 100%; margin-top: 6px; padding: 8px; border: none;
    border-radius: 4px; cursor: pointer; font-size: 13px;
}
#toggle { background: #007bff; color: #fff; }
#toggle:hover { background: #0056b3; }
#toggle.off { background: #dc3545; }
#toggle.off:hover { background: #a71d2a; }
#manualClean { background: #28a745; color: #fff; }
#manualClean:hover { background: #1e7e34; }
#options { background: #6c757d; color: #fff; }
#options:hover { background: #545b62; }
</style>
</head>
<body>
<h3>🧹 Cleaner Pro+</h3>
<div id="statusBox" class="status on">
    已清理 <span class="count" id="count">0</span> 个元素
</div>
<button id="toggle">关闭清理</button>
<button id="manualClean">🔄 立即清理当前页面</button>
<button id="options">⚙️ 规则设置</button>
<script src="popup.js"></script>
</body>
</html>
